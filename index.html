    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 20% 24%, rgba(255,255,255,0.04), transparent 18%),
        linear-gradient(90deg, rgba(0,0,0,0.00) 0%, rgba(0,0,0,0.00) 33%, rgba(0,0,0,0.18) 48%, rgba(0,0,0,0.72) 65%, rgba(0,0,0,0.96) 82%, rgba(0,0,0,1.00) 100%);
    }

    .nav {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 24px 0 24px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.64);
    }

    .nav .brand {
      font-weight: 700;
    }

    .content {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 54px);
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 34px 24px 34px 24px;
    }

    .panel {
      width: min(430px, 100%);
      margin-bottom: 4vh;
      margin-right: 1vw;
    }

    .eyebrow {
      margin-bottom: 14px;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.48);
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 1.8vw, 34px);
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      font-weight: 720;
    }

    .tagline {
      margin-top: 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: clamp(28px, 3vw, 48px);
      line-height: 1.04;
      color: rgba(255,255,255,0.96);
    }

    .rule {
      width: 68px;
      height: 1px;
      background: rgba(255,255,255,0.22);
      margin: 20px 0 18px 0;
    }

    .subcopy {
      max-width: 390px;
      line-height: 1.72;
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 22px;
    }

    .field-wrap {
      margin-bottom: 14px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.56);
    }

    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.02);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
      outline: none;
      padding: 15px 14px;
      border-radius: 0;
      font: inherit;
    }

    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.24);
    }

    #phone {
      font-size: 22px;
      padding: 15px 14px;
    }

    .helper {
      margin-top: 7px;
      color: var(--soft);
      font-size: 12px;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      align-items: end;
      margin-top: 16px;
    }

    .button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.70);
      background: transparent;
      color: #fff;
      padding: 16px 18px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .button:hover {
      background: #fff;
      color: #000;
    }

    .toggle {
      display: inline-block;
      margin-top: 8px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.58);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }

    .optional {
      display: none;
      margin-top: 16px;
    }

    .optional.open {
      display: block;
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .chill {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.28);
      line-height: 1.45;
    }

      .hero {
        background-position: 18% center;
      }

        background:

        padding-top: 12vh;

      .panel {

        margin-right: 0;

      .row {
        grid-template-columns: 1fr;
      }

      .button {

      }

      .tagline {
        font-size: clamp(24px, 8vw, 40px);
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="nav">

    </div>
