      height: 1px;
      margin: 24px 0 18px 0;
      background: rgba(255,255,255,0.28);

      line-height: 1.7;
      font-size: 16px;

      margin-bottom: 28px;

      border-top: 1px solid var(--line);
      padding-top: 18px;
    }
    .meta {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 18px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.23em;
      color: rgba(255,255,255,0.46);
    }
    .field-wrap { margin-bottom: 14px; }
    label {
      display: block;
      margin-bottom: 9px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.62);
    }
    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.02);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.22);
      outline: none;
      padding: 15px 14px;
      border-radius: 0;
      font: inherit;
    }
    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.28);
    }
    #phone {
      font-size: 24px;
      padding: 15px 14px;
      letter-spacing: 0.01em;
    }
    .helper {
      margin-top: 8px;
      color: var(--subtle);
      font-size: 12px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      margin-top: 16px;
    }

      appearance: none;
      border: 1px solid rgba(255,255,255,0.84);
      background: transparent;
      color: #fff;
      padding: 16px 20px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .button:hover { background: #fff; color: #000; }
    .toggle {
      display: inline-block;
      margin-top: 6px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.58);
      text-transform: uppercase;
      letter-spacing: 0.18em;
      font-size: 10px;
      padding: 0;
      cursor: pointer;
    }

      display: none;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid rgba(255,255,255,0.08);

    .optional.open { display: block; }
    textarea { min-height: 110px; resize: vertical; }
    .legal {
      margin-top: 18px;
      color: rgba(255,255,255,0.34);
      font-size: 11px;
      line-height: 1.55;
    }

      .layout {

      .right {
        justify-self: stretch;
        max-width: 100%;
        padding-left: 0;
      }
      h1 { font-size: clamp(46px, 14vw, 74px); }
      .row { grid-template-columns: 1fr; }
      .button { width: 100%; }
      .hero { background-position: 18% center; }
      .hero::after {
        background: linear-gradient(180deg, rgba(0,0,0,0.05) 0%, rgba(0,0,0,0.24) 36%, rgba(0,0,0,0.78) 72%, rgba(0,0,0,0.98) 100%);

  <section class="hero">
    <div class="nav">
      <div class="brand">MURDERLABS.AI</div>
      <div>System Active</div>
    </div>

    <div class="layout">
      <div class="left"></div>
      <div class="right">
        <div class="eyebrow">Specimen #084 · Documented</div>
        <h1>MURDERLABS.AI</h1>
        <div class="tagline">Intelligence with teeth.</div>
        <div class="rule"></div>
        <div class="subcopy">Drop your number. We prefer text. Everything else can happen from there.</div>

        <div class="form-shell">
          <div class="meta">
            <span>Subject</span>
            <span>Ref: ML-206A</span>
          </div>

          <div class="field-wrap">
            <label for="phone">Phone Number *</label>
            <input id="phone" type="tel" placeholder="(555) 555-5555" />
            <div class="helper">We prefer text.</div>
          </div>

          <div class="row">
            <div>
              <label for="signal">Initial Signal</label>
              <input id="signal" type="text" placeholder="What bottleneck or problem needs attention?" />
              <button class="toggle" type="button" onclick="document.getElementById('optional').classList.toggle('open')">Optional Context</button>
            </div>
            <button class="button" type="button">Enter the Lab</button>
          </div>

          <div class="optional" id="optional">
            <div class="field-wrap">
              <label for="work">Type of Work</label>
              <input id="work" type="text" placeholder="Consulting, logistics, manufacturing..." />
            </div>
            <div class="field-wrap">
              <label for="detail">Bottleneck Detail</label>
              <textarea id="detail" placeholder="Add any useful context here."></textarea>
            </div>
            <div class="field-wrap">
              <label for="email">Email</label>
              <input id="email" type="email" placeholder="Optional" />
            </div>
          </div>

          <div class="legal">By entering your number, you agree to be contacted by text about your inquiry.</div>
        </div>
      </div>
    </div>
  </section>
