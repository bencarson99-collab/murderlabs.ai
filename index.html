    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at 23% 26%, rgba(255,255,255,0.04), transparent 20%),
        linear-gradient(90deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.02) 40%, rgba(0,0,0,0.24) 54%, rgba(0,0,0,0.82) 72%, rgba(0,0,0,0.98) 100%);
    }
    .nav {
      position: relative;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 26px 0 26px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.28em;
      color: rgba(255,255,255,0.68);
    }
    .nav .brand {
      font-weight: 700;
    }
    .content {
      position: relative;
      z-index: 2;
      min-height: calc(100vh - 60px);
      display: flex;
      justify-content: flex-end;
      align-items: flex-end;
      padding: 34px 26px 34px 26px;
    }
    .panel {
      width: min(460px, 100%);
      margin-bottom: 2vh;
    }
    .eyebrow {
      display: inline-block;
      margin-bottom: 18px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.24em;
      color: rgba(255,255,255,0.56);
    }
    h1 {
      margin: 0;
      font-size: clamp(28px, 2.3vw, 42px);
      line-height: 1;
      letter-spacing: -0.03em;
      text-transform: uppercase;
      font-weight: 750;
    }
    .tagline {
      margin-top: 14px;
      font-family: Georgia, "Times New Roman", serif;
      font-style: italic;
      font-size: clamp(28px, 3vw, 46px);
      line-height: 1.08;
      color: rgba(255,255,255,0.96);
    }
    .rule {
      width: 74px;
      height: 1px;
      background: rgba(255,255,255,0.28);
      margin: 22px 0 18px 0;
    }
    .subcopy {
      max-width: 390px;
      line-height: 1.72;
      font-size: 16px;
      color: var(--muted);
      margin-bottom: 22px;
    }
    .field-wrap {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 9px;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      color: rgba(255,255,255,0.58);
    }
    input, textarea {
      width: 100%;
      background: rgba(255,255,255,0.02);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.16);
      outline: none;
      padding: 15px 14px;
      border-radius: 0;
      font: inherit;
    }
    input::placeholder, textarea::placeholder {
      color: rgba(255,255,255,0.26);
    }
    #phone {
      font-size: 22px;
      padding: 15px 14px;
    }
    .helper {
      margin-top: 8px;
      color: var(--soft);
      font-size: 12px;
    }
    .row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 14px;
      align-items: end;
      margin-top: 16px;
    }
    .button {
      appearance: none;
      border: 1px solid rgba(255,255,255,0.78);
      background: transparent;
      color: #fff;
      padding: 16px 18px;
      text-transform: uppercase;
      letter-spacing: 0.22em;
      font-size: 12px;
      cursor: pointer;
      white-space: nowrap;
    }
    .button:hover {
      background: #fff;
      color: #000;
    }
    .toggle {
      display: inline-block;
      margin-top: 8px;
      border: none;
      background: transparent;
      color: rgba(255,255,255,0.60);
      font-size: 12px;
      cursor: pointer;
      padding: 0;
    }
    .optional {
      display: none;
      margin-top: 16px;
    }
    .optional.open {
      display: block;
    }
    textarea {
      min-height: 110px;
      resize: vertical;
    }
    .chill {
      margin-top: 16px;
      font-size: 11px;
      color: rgba(255,255,255,0.30);
      line-height: 1.45;
    }
    @media (max-width: 980px) {
      .hero {
        background-position: 20% center;
      }
      .hero::after {
        background:
          linear-gradient(180deg, rgba(0,0,0,0.02) 0%, rgba(0,0,0,0.14) 32%, rgba(0,0,0,0.72) 68%, rgba(0,0,0,0.96) 100%);
      }
      .content {
        align-items: flex-end;
        padding-top: 12vh;
      }
      .panel {
        width: 100%;
      }
      .row {
        grid-template-columns: 1fr;
      }
      .button {
        width: 100%;
      }
      .tagline {
        font-size: clamp(24px, 8vw, 38px);
      }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="nav">
      <div class="brand">MURDERLABS.AI</div>
      <div>System Active</div>
    </div>

    <div class="content">
      <div class="panel">
        <div class="eyebrow">Specimen #084 · Documented</div>
        <h1>MURDERLABS.AI</h1>
        <div class="tagline">Intelligence with teeth.</div>
        <div class="rule"></div>
        <div class="subcopy">Tell us more. We prefer text. Start with your number and whatever context feels useful.</div>

        <div class="field-wrap">
          <label for="phone">Phone Number *</label>
          <input id="phone" type="tel" placeholder="(555) 555-5555" />
          <div class="helper">Text is easiest.</div>
        </div>

        <div class="row">
          <div>
            <label for="signal">Initial Signal</label>
            <input id="signal" type="text" placeholder="What bottleneck, problem, or mess needs attention?" />
            <button class="toggle" type="button" onclick="document.getElementById('optional').classList.toggle('open')">Tell us more (optional)</button>
          </div>
          <button class="button" type="button">Enter the Lab</button>
        </div>

        <div class="optional" id="optional">
          <div class="field-wrap">
            <label for="work">Type of Work</label>
            <input id="work" type="text" placeholder="Consulting, logistics, manufacturing..." />
          </div>
          <div class="field-wrap">
            <label for="detail">More Context</label>
            <textarea id="detail" placeholder="Anything else we should know."></textarea>
          </div>
          <div class="field-wrap">
            <label for="email">Email</label>
            <input id="email" type="email" placeholder="Optional" />
          </div>
        </div>

        <div class="chill">No long forms. No weird intake ritual.</div>
      </div>
    </div>
  </section>
</body>
</html>
